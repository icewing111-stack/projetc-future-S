<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>편의점 길잡이 AI</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      background: white;
      width: 100%;
      max-width: 600px;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 8px;
      color: #1a1a1a;
      text-align: center;
    }
    p.subtitle {
      text-align: center;
      color: #666;
      font-size: 0.95rem;
      margin-bottom: 24px;
    }
    input[type="text"] {
      width: 100%;
      padding: 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus {
      border-color: #2563eb;
    }
    button {
      width: 100%;
      margin-top: 12px;
      padding: 14px;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #1d4ed8;
    }
    button:disabled {
      background-color: #93c5fd;
      cursor: not-allowed;
    }
    .result-box {
      margin-top: 24px;
      padding: 16px;
      background-color: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      min-height: 100px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.6;
      color: #334155;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>편의점 길잡이 AI</h1>
    <p class="subtitle">현재 계신 위치나 찾고 싶은 지역을 입력해 주세요.</p>
    
    <input type="text" id="userInput" placeholder="예: 서울 강남역 1번 출구 근처, 골목길 안쪽 등">
    <button id="submitBtn" onclick="findConvenienceStore()">편의점 정보 찾기</button>

    <div id="resultBox" class="result-box">AI의 안내 결과가 여기에 표시됩니다.</div>
  </div>

  <script>
    async function findConvenienceStore() {
      const input = document.getElementById('userInput').value.trim();
      const resultBox = document.getElementById('resultBox');
      const submitBtn = document.getElementById('submitBtn');

      if (!input) {
        alert('위치나 상황을 입력해 주세요.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerText = '검색 중...';
      resultBox.innerText = 'AI가 주변 편의점 정보를 확인하고 있습니다...';

      try {
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ input }),
        });

        const data = await response.json();

        if (response.ok) {
          resultBox.innerText = data.result;
        } else {
          resultBox.innerText = '오류: ' + (data.error || '알 수 없는 에러가 발생했습니다.');
        }
      } catch (err) {
        console.error(err);
        resultBox.innerText = '서버 통신 중 오류가 발생했습니다.';
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = '편의점 정보 찾기';
      }
    }
  </script>

</body>
</html>
